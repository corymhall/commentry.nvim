name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Run lint tasks
        run: mise run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev
      - name: Run tests
        run: mise run test

      - name: Run checkhealth
        run: mise run health
